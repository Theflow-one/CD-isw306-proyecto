<<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Proyecto ISW306</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0b1838;
        }

        .login-card{
            max-width:420px;
            margin:auto;
            margin-top:90px;
            border-radius:15px;
        }

        h2{
            color:#F68121;
            font-weight:bold;
        }

        .btn-login{
            background:#F68121;
            border:none;
        }

        .btn-login:hover{
            background:#d86f16;
        }
    </style>

</head>

<body>

<div class="container">

<div class="card shadow login-card">

<div class="card-body p-4">

<h2 class="text-center mb-4">
Proyecto ISW-306
</h2>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">
Correo electrónico
</label>

<input
type="email"
class="form-control"
id="correo"
placeholder="correo@ejemplo.com"
required>

</div>

<div class="mb-3">

<label class="form-label">
Contraseña
</label>

<input
type="password"
class="form-control"
id="contrasena"
placeholder="********"
required>

</div>

<div id="mensaje" class="mb-3 text-danger fw-bold"></div>

<button
type="submit"
class="btn btn-login text-white w-100">

Iniciar Sesión

</button>

</form>

</div>

</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const correo=document.getElementById("correo").value;
const contrasena=document.getElementById("contrasena").value;

if(correo==="" || contrasena===""){

document.getElementById("mensaje").innerHTML="Complete todos los campos";

return;

}

sessionStorage.setItem("usuario",correo);

window.location.href="Dashboard.html";

});

</script>

</body>

</html>
